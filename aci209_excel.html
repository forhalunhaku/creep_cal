<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aci209_excel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
        }
        #sidebar {
            width: 200px;
            background-color: #1976D2;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding-top: 20px;
        }
        #content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            flex-direction: column;
            position: relative;
        }
        #fileInput {
            display: none;
        }
        label {
            cursor: pointer;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            padding: 10px 20px;
            width: 160px;
            height: 40px;
            font-size: 16px;
        }
        #fileLabel {
            background-color: #610ab8;
            color: #FFFFFF;
        }
        #calculateLabel {
            background-color: #00796B;
            color: #FFFFFF;
        }
        #exportLabel {
            background-color: #742605;
            color: #FFFFFF;
        }
        label:hover {
            opacity: 0.8;
        }
        label:focus {
            outline: none;
        }
        #chartContainer {
            width: 600px;
            height: 400px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .feedback {
            color: green;
            margin-top: 10px;
            display: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <label id="fileLabel" for="fileInput">
            <span>Upload File</span>
            <input type="file" id="fileInput" accept=".xlsx">
        </label>
        <label id="calculateLabel" onclick="handleCalculate()">
            <span>Calculate</span>
        </label>
        <label id="exportLabel" onclick="handleExport()">
            <span>Export</span>
        </label>
    </div>
    <div id="content">
        <div class="feedback" id="fileFeedback"></div>
        <div class="feedback" id="calculationFeedback"></div>
        <div class="feedback" id="exportFeedback"></div>
        <div id="chartContainer">
            <canvas id="chartCanvas"></canvas>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.16.9/xlsx.full.min.js"></script>
    <script>
        let fileData = null;

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const sheet = workbook.Sheets[sheetName];
                fileData = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                showFeedbackMessage('File uploaded and read successfully.', 'fileFeedback');
            };
            reader.readAsArrayBuffer(file);
        });

        function calculatePhi(t0, H, VS, sphi, Cc, alpha, t) {
            let beta_t0 = 1.25 * Math.pow(t0, -0.118);
            let beta_RH = 1.27 - 0.0067 * H;
            let beta_VS = 2 * (1 + 1.13 * Math.exp(-0.0213 * VS)) / 3;
            let beta_sphi = 0.88 + 0.244 * sphi;
            let beta_Cc = 0.75 + 0.00061 * Cc;
            let beta_alpha = 0.46 + 9 * alpha;
            let phi_infinity = 2.35 * beta_t0 * beta_RH * beta_VS * beta_sphi * beta_Cc * beta_alpha;
            let beta_c = Math.pow(t - t0, 0.6) / (10 + Math.pow(t - t0, 0.6));
            let phi = beta_c * phi_infinity;
            return phi.toFixed(2);
        }

        function handleCalculate() {
            if (!fileData) {
                showFeedbackMessage('Please upload a file first.', 'calculationFeedback');
                return;
            }

            const canvas = document.getElementById('chartCanvas');
            const ctx = canvas.getContext('2d');

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Extract data for chart
            const chartData = fileData.slice(1).map(row => ({
                x: row[6]-row[0],
                y: parseFloat(calculatePhi(...row))
            }));

            // Configure chart options
            const options = {
                type: 'scatter',
                data: {
                    datasets: [{
                        label: 'Scatter Plot',
                        data: chartData,
                        backgroundColor: '#1976D2',
                        pointRadius: 4
                    }]
                },
                options: {
                    scales: {
                        x: {
                            type: 'linear',
                            position: 'bottom',
                            title: {
                                display: true,
                                text: 't-t0'
                            }
                        },
                        y: {
                            type: 'linear',
                            position: 'left',
                            title: {
                                display: true,
                                text: 'phi'
                            }
                        }
                    }
                }
            };

            // Create chart
            new Chart(ctx, options);

            showFeedbackMessage('Calculation completed.', 'calculationFeedback');
        }

        function handleExport() {
            if (!fileData) {
                showFeedbackMessage('Please upload a file first.', 'exportFeedback');
                return;
            }

            // Create a new workbook
            const wb = XLSX.utils.book_new();

            // Prepare data for calculations including t-t0
            const newData = fileData.slice(1).map(row => {
                const t = row[6]; // Assuming the seventh column is 't'
                const t0 = row[0]; // Assuming the first column is 't0'
                const phiValue = calculatePhi(...row);
                const tMinusT0 = t - t0; // Calculate t-t0
                return [...row, tMinusT0, phiValue]; // Append Phi value and t-t0 to the row
            });

            // Add headers for Phi and t-t0
            const headers = [...fileData[0], "t-t0", "Phi"];
            
            // Combine headers with data
            const combinedData = [headers, ...newData];

            // Add a worksheet for calculations
            const ws = XLSX.utils.aoa_to_sheet(combinedData);

            // Add the worksheet to the workbook
            XLSX.utils.book_append_sheet(wb, ws, "Calculations");

            // Save the workbook as an Excel file
            XLSX.writeFile(wb, "calculations.xlsx");

            showFeedbackMessage('Results exported.', 'exportFeedback');
        }
        function showFeedbackMessage(message, elementId) {
            const feedbackElement = document.getElementById(elementId);
            feedbackElement.innerText = message;
            feedbackElement.style.display = "block";
            setTimeout(function() {
                feedbackElement.style.display = "none";
            }, 1000);
        }
    </script>
</body>
</html>
