<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aci209_excel</title>
    <!-- 资源预加载 -->
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/chart.js" as="script">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.16.9/xlsx.full.min.js" as="script">
    <link rel="stylesheet" href="excelstyles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="container">
        <div id="left-panel">
            <div class="button-container">
                <input type="file" id="fileInput" accept=".xlsx,.xls">
                <button class="button" onclick="document.getElementById('fileInput').click()">
                    上传文件
                </button>
                <button class="button" id="calculateBtn" onclick="handleCalculate()">
                    计算
                </button>
                <button class="button" id="exportBtn" onclick="handleExport()">
                    导出
                </button>
            </div>
        </div>
      
        <div id="right-panel">
            <div id="title-area">
                <h2>计算结果</h2>
            </div>
            <div id="chartContainer">
                <canvas id="chartCanvas"></canvas>
            </div>
            <div class="loading-overlay">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <div id="content">
        <div class="feedback" id="fileFeedback"></div>
        <div class="feedback" id="calculationFeedback"></div>
        <div class="feedback" id="exportFeedback"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.16.9/xlsx.full.min.js"></script>
    <script src="aci209_excel.js"></script>
</body>
</html>
