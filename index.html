      name="description"

    />

    <title>CREEP LAB | Concrete creep calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      (function () {
        const THEME_ORDER = ['system', 'light', 'dark'];
        function getSystemTheme() {
          return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        function getTheme() {
          const saved = localStorage.getItem('theme-mode');
          if (THEME_ORDER.includes(saved)) return saved;
          return 'system';
        }
        function setTheme(theme) {
          localStorage.setItem('theme-mode', theme);
          document.body.setAttribute('data-theme', theme === 'system' ? getSystemTheme() : theme);
        }
        window.toggleTheme = function () {
          const cur = getTheme();
          const idx = THEME_ORDER.indexOf(cur);
          setTheme(THEME_ORDER[(idx + 1) % THEME_ORDER.length]);
        };
        setTheme(getTheme());
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function () {
          if (getTheme() === 'system') setTheme('system');
        });
      })();
    </script>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
