<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Halunhaku - 工程计算工具</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <style>
    :root {
      /* 浅色模式变量 */
      --bg-gradient-1: #4158D0;
      --bg-gradient-2: #C850C0;
      --bg-gradient-3: #FFCC70;
      --card-bg: rgba(255, 255, 255, 0.1);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.8);
      --accent-color: #00ff88;
      --border-radius: 24px;
      --transition: all 0.4s ease;
    }

    /* 深色模式变量 */
    [data-theme="dark"] {
      --bg-gradient-1: #1a1a2e;
      --bg-gradient-2: #16213e;
      --bg-gradient-3: #1a1a2e;
      --card-bg: rgba(255, 255, 255, 0.05);
      --text-primary: #e1e1e1;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --accent-color: #4ecca3;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      min-height: 100vh;
      background: linear-gradient(45deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    nav {
      width: 100%;
      max-width: 1200px;
      padding: 1rem 2rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: var(--border-radius);
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(to right, #fff, var(--accent-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .theme-toggle {
      background: none;
      border: none;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 1.2rem;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      padding: 1rem;
    }

    .section-title {
      grid-column: 1 / -1;
      font-size: 2.5rem;
      font-weight: 700;
      margin: 2rem 0;
      text-align: center;
      position: relative;
      color: var(--text-primary);
    }

    .section-title::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 4px;
      background: var(--accent-color);
      border-radius: 2px;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border-radius: var(--border-radius);
      padding: 2rem;
      transition: var(--transition);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      border-color: var(--accent-color);
    }

    .card-title {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: var(--accent-color);
      text-align: center;
    }

    .card-list {
      list-style: none;
    }

    .card-list li {
      margin-bottom: 1rem;
    }

    .card-link {
      display: flex;
      align-items: center;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      color: var(--text-primary);
      text-decoration: none;
      transition: var(--transition);
    }

    .card-link:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateX(5px);
    }

    .card-link i {
      margin-right: 1rem;
      font-size: 1.2rem;
      color: var(--accent-color);
    }
    .theme-toggle {
      transition: transform 0.3s ease;
    }

    .theme-toggle:hover {
      transform: rotate(45deg);
    }

    .theme-toggle i {
      transition: all 0.3s ease;
    }

    /* 添加主题切换的过渡效果 */
    body {
      transition: background 0.3s ease, color 0.3s ease;
    }

    .card {
      transition: background 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
    }

    footer {
      margin-top: 4rem;
      padding: 2rem;
      text-align: center;
      color: var(--text-secondary);
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }
      
      .section-title {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

  <script>
    // 主题切换功能
    const themeToggle = document.querySelector('.theme-toggle');
    const icon = themeToggle.querySelector('i');
    
    // 检查本地存储中的主题设置
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateIcon(savedTheme);

    // 监听系统主题变化
    if (window.matchMedia) {
      const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
      mediaQuery.addListener((e) => {
        const systemTheme = e.matches ? 'dark' : 'light';
        // 如果用户没有手动设置主题，则跟随系统
        if (!localStorage.getItem('theme')) {
          document.documentElement.setAttribute('data-theme', systemTheme);
          updateIcon(systemTheme);
        }
      });
    }

    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateIcon(newTheme);
    });

    function updateIcon(theme) {
      icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    }
  </script>
