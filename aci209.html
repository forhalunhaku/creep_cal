<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACI209</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4A90E2;
            --secondary-color: #50E3C2;
            --text-color: #FFFFFF;
            --hover-color: #FFD700;
            --card-bg: rgba(255, 255, 255, 0.2);
            --box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            --border-radius: 16px;
            --transition-speed: 0.3s;
        }

        body {
            font-family: 'SF Pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: radial-gradient(circle, var(--primary-color), var(--secondary-color));
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        #container {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            width: 100%;
        }

        #left-panel, #right-panel, #middle-panel {
            padding: 20px;
            background: var(--card-bg);
            box-shadow: var(--box-shadow);
            border-radius: var(--border-radius);
            margin: 8px;
            flex: 1; 
        } 

        #left-panel {
            height: 70vh;
            position: relative; 
            flex-basis: 10%;
            display: block;
        }

        #right-panel {
            width: 500px; /* 设置固定宽度 */
            height: 70vh;
            display: flex;
            flex-direction: column;
            flex-basis: 40%;
        }

        #middle-panel {
            height: 70vh; 
            overflow-y: auto;
            flex-basis: 10%; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        label {
            font-weight: 600;
        }

        #title-area {
          align-items: center;
          margin-bottom: 20px;
        }

        #title-area h2 {
          text-align: center; /* 水平居中 */
        }

        #input-area {
          align-items: center;
          max-height: 54vh; /* Set a maximum height */
          overflow-y: auto; /* Enable vertical scroll if needed */
        }


        input, select, button {
            margin-bottom: 10px;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: none;
            border-radius: var(--border-radius);
            font-size: 16px;
            font-family: inherit;
        }

        input, select {
            background: rgba(255, 255, 255, 0.8);
            color: #333;
        }

        button {
            background-color: #1E88E5;
            color: white;
            cursor: pointer;
            transition: background-color var(--transition-speed);
        }

        button:hover {
            background-color: #FFD700;
        }

        canvas {
            width: auto;
            height: 400px;
        }

        /* 整个滚动条 */
        ::-webkit-scrollbar {
          width: 8px; /* 滚动条宽度 */
          background-color: rgba(255, 255, 255, 0.2); /* 滚动条背景色 */
        }

        /* 滚动条轨道 */
        ::-webkit-scrollbar-track {
          background-color: transparent; /* 轨道背景透明 */
        }

        /* 滚动条滑块 */
        ::-webkit-scrollbar-thumb {
          background-color: var(--primary-color); /* 滑块颜色 */
          border-radius: 4px; /* 滑块圆角 */
          transition: background-color var(--transition-speed); /* 添加过渡效果 */
        }

        /* 鼠标悬停在滑块上 */
        ::-webkit-scrollbar-thumb:hover {
          background-color: var(--hover-color); /* 悬停时滑块颜色 */
        }

        input::placeholder {
          color: #999; 
        }
    </style>
</head>
<body>
<div id="container">
    <div id="left-panel">
        <div id="title-area">
            <h2>输入参数</h2>
        </div>
        <div id="input-area">
            <label for="t0">t0: 加载龄期</label>
            <input type="text" id="t0" placeholder="day">
            <label for="H">H: 环境相对湿度</label>
            <input type="text" id="H" placeholder="0.6">
            <label for="VS">V/S: 体表比</label>
            <input type="text" id="VS" placeholder="33">
            <label for="sphi">sphi: 砂率</label>
            <input type="text" id="sphi" placeholder="0.42">
            <label for="Cc">Cc: 水泥含量</label>
            <input type="text" id="Cc" placeholder="Kg/m^3">
            <label for="alpha">alpha: 空气含量</label>
            <input type="text" id="alpha" placeholder=">0.06,如0.1">
        </div>
    </div>

    <div id="middle-panel">
        <button onclick="calculate()">Calculate</button>
        <button onclick="exportToExcel()">Export to Excel</button>
    </div>

    <div id="right-panel">
        <div id="title-area">
            <h2>计算结果</h2>
        </div>
        <canvas id="chart"></canvas>
        </div>
    </div>
</div>

<script>
function calculate_phi(t0, H, VS, sphi, Cc, alpha, t) {
    let beta_t0 = 1.25 * Math.pow(t0, -0.118);
    let beta_RH = 1.27 - 0.0067 * H;
    let beta_VS = 2 * (1 + 1.13 * Math.exp(-0.0213 * VS)) / 3;
    let beta_sphi = 0.88 + 0.244 * sphi;
    let beta_Cc = 0.75 + 0.00061 * Cc;
    let beta_alpha = 0.46 + 9 * alpha;
    let phi_infinity = 2.35 * beta_t0 * beta_RH * beta_VS * beta_sphi * beta_Cc * beta_alpha;
    let beta_c = Math.pow(t - t0, 0.6) / (10 + Math.pow(t - t0, 0.6));
    let phi = beta_c * phi_infinity;
    return phi;
}

function plot_graph(t0, H, VS, sphi, Cc, alpha) {
    let num_points = 10000;
    let t_values = Array.from({ length: num_points }, (_, i) => t0 + i);
    let phi_values = t_values.map(t => calculate_phi(t0, H, VS, sphi, Cc, alpha, t));

    let ctx = document.getElementById('chart').getContext('2d');
    if (window.myChart instanceof Chart) {
        window.myChart.destroy(); // Destroy the previous chart if it exists
    }
    window.myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: t_values.map(t => t - t0),
            datasets: [{
                label: 'Phi',
                data: phi_values,
                borderColor: 'blue',
                backgroundColor: 'transparent'
            }]
        },
        options: {
            scales: {
                x: {
                    type: 'logarithmic',
                    title: {
                        display: true,
                        text: 't - t0'
                    }
                },
                y: {
                    title: {
                        display: true,
                        text: 'Phi'
                    }
                }
            }
        }
    });
}

function calculate() {
    let t0 = parseFloat(document.getElementById('t0').value);
    let H = parseFloat(document.getElementById('H').value);
    let VS = parseFloat(document.getElementById('VS').value);
    let sphi = parseFloat(document.getElementById('sphi').value);
    let Cc = parseFloat(document.getElementById('Cc').value);
    let alpha = parseFloat(document.getElementById('alpha').value);
    plot_graph(t0, H, VS, sphi, Cc, alpha); 
}

function exportToExcel() {
    let t0 = parseFloat(document.getElementById('t0').value);
    let H = parseFloat(document.getElementById('H').value);
    let VS = parseFloat(document.getElementById('VS').value);
    let sphi = parseFloat(document.getElementById('sphi').value);
    let Cc = parseFloat(document.getElementById('Cc').value);
    let alpha = parseFloat(document.getElementById('alpha').value);
    
    let t_values = Array.from({ length: 10000 }, (_, i) => t0 + i);
    let phi_values = t_values.map(t => calculate_phi(t0, H, VS, sphi, Cc, alpha, t));
    let time_values = t_values.map(t => t - t0);

    let csvContent = "data:text/csv;charset=utf-8,"
        + "t-t0,Phi\n";
    time_values.forEach((time, index) => {
        let row = time + "," + phi_values[index] + "\n";
        csvContent += row;
    });

    let encodedUri = encodeURI(csvContent);
    let link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", "phi_data_aci209.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>
</body>
</html>
